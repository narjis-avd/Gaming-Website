<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Portfolio | Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <script src="cdn/jquery-3.6.0.min.js"></script>
    <!-- <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> -->
    <script src="cdn/jquery.validate.min.js"></script>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script> -->
</head>

<body>
    <header>
        <div class="head-left">
            <img src="images/logo.png" alt="logo">
            <button onclick="window.location.href='store.html'">Products</button>
        </div>

        <div class="head-right" id="nav-links">
            <p><a href="index.html">HOME</a></p>
            <p><a href="index.html#about">ABOUT</a></p>
            <p><a href="store.html">STORE</a></p>
            <p><a href="FAQS.html">FAQS</a></p>
            <p><a href="contact.html">CONTACT</a></p>
            <p class="nav-auth-link" id="nav-auth-link"></p>
        </div>
    </header>
    <div id="contact-form-btn">
        <div class="gaming-bg-header"></div>
        <main class="contact-area">
            <div class="section-title">
                <h2>Get In Touch</h2>
                <div class="purple-glow-bar"></div>
            </div>
            <div class="flex-container">
                <div class="contact-details">
                    <div class="detail-item">
                        <div class="icon-wrap"><i class="fas fa-envelope"></i></div>
                        <div>
                            <span class="label">Email</span>
                            <p class="value">gamingwebsite@gmail.com</p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="icon-wrap"><i class="fab fa-github"></i></div>
                        <div>
                            <span class="label">GitHub</span>
                            <p class="value">github.com/jaffarwajeeha13</p>
                        </div>
                    </div>
                    <div class="gaming-status">
                        <i class="fas fa-terminal"></i>
                        <div>
                            <strong>Open to opportunities</strong>
                            <p>Seeking internships in AI and Creative Tech.</p>
                        </div>
                    </div>
                </div>
                <div class="glass-form-container">
                    <form id="contactForm">
                        <div class="input-box">
                            <label for="name">Full Name</label>
                            <input type="text" name="name" id="name" placeholder="Enter your name">
                        </div>
                        <div class="input-box">
                            <label for="email">Email Address</label>
                            <input type="email" name="email" id="email" placeholder="example@gmail.com">
                        </div>
                        <div class="input-box">
                            <label for="message">Your Message</label>
                            <textarea name="message" id="message" rows="4"
                                placeholder="Type your message..."></textarea>
                        </div>
                        <button type="submit" id="submitBtn">
                            SEND MESSAGE <i class="fas fa-bolt"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Gaming Hub. All rights reserved.</p>
            <ul>
                <li><a href="#"><i class="bx bxl-youtube"></i></a></li>
                <li><a href="#"><i class="bx bxl-twitter"></i></a></li>
                <li><a href="#"><i class="bx bxl-instagram"></i></a></li>
                <li><a href="#"><i class="bx bxl-github"></i></a></li>
                <li><a href="#"><i class="bx bxl-linkedin"></i></a></li>
            </ul>
            <p>Privacy Policy</p>
        </footer>
    </div>

    <script>
        $(document).ready(function () {
            // Initial animation
            $('.contact-area').hide().fadeIn(1500);

            // JQuery Validation Setup
            $("#contactForm").validate({
                rules: {
                    name: {
                        required: true,
                        minlength: 3
                    },
                    email: {
                        required: true,
                        email: true
                    },
                    message: {
                        required: true,
                        minlength: 10
                    }
                },
                messages: {
                    name: {
                        required: "Please enter your tag (name)",
                        minlength: "Name must be at least 3 characters"
                    },
                    email: {
                        required: "Email is required to connect",
                        email: "Please enter a valid email address"
                    },
                    message: {
                        required: "The message box is empty!",
                        minlength: "Your message is too short for the quest"
                    }
                },
                // This replaces your manual form submit logic
                submitHandler: async function (form) {
                    const name = $('input[name="name"]').val();
                    const email = $('input[name="email"]').val();
                    const message = $('textarea[name="message"]').val();
                    
                    $('#submitBtn').prop('disabled', true).html('SENDING... <i class="fas fa-spinner fa-spin"></i>');

                    try {
                        const res = await fetch(`${API_BASE}/api/contact`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name, email, message })
                        });
                        const data = await res.json();
                        
                        if (!res.ok) throw new Error(data.message || 'Quest failed. Submission error.');
                        
                        showToast(data.message || "GG, " + name + "! Your message was sent successfully.", "success");
                        form.reset();
                    } catch (err) {
                        showToast(err.message, "error");
                    } finally {
                        $('#submitBtn').prop('disabled', false).html('SEND MESSAGE <i class="fas fa-bolt"></i>');
                    }
                }
            });

            // Focus/Blur effects (retained from your original code)
            $('input, textarea').on('focus', function () {
                $(this).css({
                    'border-color': '#6d28d9',
                    'box-shadow': '0 0 10px rgba(109, 40, 217, 0.5)',
                    'transform': 'scale(1.01)'
                });
            });

            $('input, textarea').on('blur', function () {
                $(this).css({
                    'border-color': '#334155',
                    'box-shadow': 'none',
                    'transform': 'scale(1)'
                });
            });
        });
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const API_BASE = window.location.origin;
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const isLoggedIn = !!token;

        document.addEventListener('DOMContentLoaded', () => {
            updateNavAuth();
            setupSocketIO();
        });

        function updateNavAuth() {
            const authLink = document.getElementById('nav-auth-link');
            if (authLink) {
                if (isLoggedIn && user) {
                    let html = `<a href="#" onclick="logout()" style="color:#edff66;">${user.username} (Logout)</a>`;
                    if (user.role === 'admin') {
                        html = `<a href="admin.html" style="color:#00f5ff; margin-right:15px; font-weight:bold;">ADMIN DASHBOARD</a>` + html;
                    }
                    authLink.innerHTML = html;
                } else {
                    authLink.innerHTML = `<a href="login.html" style="color:#edff66;">LOGIN</a>`;
                }
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        function setupSocketIO() {
            try {
                const socket = io();
                socket.on('orderUpdate', (data) => {
                    showToast(data.message);
                });
            } catch (e) {
                console.log('Socket.io not available');
            }
        }

        function showToast(message) {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                Object.assign(container.style, {
                    position: 'fixed', top: '80px', right: '20px', zIndex: '10000', display: 'flex', flexDirection: 'column', gap: '10px'
                });
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            Object.assign(toast.style, {
                padding: '14px 20px', background: 'rgba(15,15,25,.95)', backdropFilter: 'blur(16px)', border: '1px solid rgba(0,245,255,.4)', borderRadius: '12px', color: '#fff', fontSize: '14px', boxShadow: '0 8px 32px rgba(0,0,0,.4)', display: 'flex', alignItems: 'center', gap: '10px', maxWidth: '360px', fontFamily: "'Inter', sans-serif"
            });
            toast.innerHTML = `<i class="fas fa-info-circle" style="color:#00f5ff"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>

</html>
