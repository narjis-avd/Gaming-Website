<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Slider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }
        .game-slider {
            width: 90%;
            margin: 50px auto;
        }
        .slider img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 0 20px #00f5ff;
        }
        .slick-prev, .slick-next {
            z-index: 1000;
        }
        .slick-prev:before,
        .slick-next:before {
            color: #00f5ff;
            font-size: 30px;
        }
        .slick-dots li button:before {
            color: #00f5ff;
        }
          @media (max-width: 992px) {
            .game-slider {
                width: 95%;
            }
        }
        @media (max-width: 768px) {
            .game-slider {
                margin: 25px auto;
            }
            .slider img {
                border-radius: 10px;
            }
        }
        @media (max-width: 480px) {
            .slider img {
                height: 200px;
            }

            .slick-prev:before,
            .slick-next:before {
                font-size: 18px;
            }
        }
        @media (min-width: 1400px) {
            .game-slider {
                max-width: 1300px;
            }
        }
    </style>
</head>
<body>
    <section class="game-slider">
        <div class="slider">
            <div><img src="images/silder-1.jfif" alt="Game 1"></div>
            <div><img src="images/silder-2.jfif" alt="Game 2"></div>
            <div><img src="images/silder-3.jfif" alt="Game 3"></div>
            <div><img src="images/silder-4.jfif" alt="Game 4"></div>
        </div>
    </section>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script>
        $(document).ready(function(){
            $('.slider').slick({
                autoplay: true,
                autoplaySpeed: 2000,
                dots: true,
                arrows: true,
                infinite: true,
                speed: 800,
                fade: false,
                cssEase: 'ease-in-out'
            });
        });
    </script>
</body>
</html>
