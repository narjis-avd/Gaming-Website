<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Hub | Cart & Checkout</title>
    <meta name="description" content="Review your cart and complete your purchase at Gaming Hub with wallet or bank payment.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* ─── Cart Banner ─── */
        .cart-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0.2), #050505),
                linear-gradient(135deg, rgba(109, 40, 217, 0.25), rgba(237, 255, 102, 0.08));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-banner h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #edff66, #00f5ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ─── Cart Layout ─── */
        .cart-container {
            max-width: 1200px;
            margin: -20px auto 0;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            position: relative;
        }

        /* ─── Cart Items ─── */
        .cart-items-panel {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(109, 40, 217, 0.2);
            border-radius: 18px;
            padding: 28px;
        }

        .cart-items-panel h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-items-panel h2 i { color: #edff66; }

        .cart-item {
            display: flex;
            gap: 16px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
            animation: fadeSlideIn 0.3s ease;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cart-item:last-child { border-bottom: none; }

        .cart-item-img {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .cart-item-info .item-category {
            font-size: 12px;
            color: #a78bfa;
            margin-bottom: 8px;
        }

        .cart-item-info .item-price {
            font-size: 18px;
            font-weight: 800;
            color: #edff66;
        }

        /* Quantity Controls */
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-controls button {
            width: 34px;
            height: 34px;
            background: #1e1e3a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .qty-controls button:hover {
            border-color: #6d28d9;
            background: rgba(109, 40, 217, 0.2);
        }

        .qty-controls span {
            font-size: 16px;
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }

        .cart-item-remove {
            background: transparent;
            border: none;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .cart-item-remove:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ─── Empty Cart ─── */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-cart i {
            font-size: 52px;
            color: #6d28d9;
            margin-bottom: 16px;
        }

        .empty-cart h3 {
            color: #fff;
            margin-bottom: 8px;
        }

        .empty-cart a {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #6d28d9, #7c3aed);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .empty-cart a:hover {
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.5);
            transform: translateY(-2px);
        }

        /* ─── Checkout Panel ─── */
        .checkout-panel {
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        .checkout-card {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(109, 40, 217, 0.2);
            border-radius: 18px;
            padding: 28px;
        }

        .checkout-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkout-card h2 i { color: #00f5ff; }

        /* Wallet Badge */
        .wallet-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(237, 255, 102, 0.05), rgba(0, 245, 255, 0.05));
            border: 1px solid rgba(237, 255, 102, 0.15);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .wallet-display .wallet-label {
            font-size: 13px;
            color: #94a3b8;
        }

        .wallet-display .wallet-label i {
            color: #edff66;
            margin-right: 6px;
        }

        .wallet-display .wallet-amount {
            font-size: 20px;
            font-weight: 800;
            color: #edff66;
        }

        /* Order Summary */
        .order-summary {
            margin-bottom: 20px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: #94a3b8;
        }

        .order-row.total {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 8px;
            padding-top: 14px;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }

        .order-row.total span:last-child { color: #edff66; }

        /* Checkout Form */
        .checkout-form { margin-top: 20px; }

        .checkout-form label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a78bfa;
            margin-bottom: 6px;
        }

        .checkout-form input,
        .checkout-form select {
            width: 100%;
            padding: 12px 14px;
            background: #0c0c18;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .checkout-form input:focus,
        .checkout-form select:focus {
            border-color: #6d28d9;
        }

        .checkout-form select option { background: #0c0c18; }

        .bank-fields {
            display: none;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #1e1e3a;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .bank-fields.active { display: block; animation: fadeSlideIn 0.3s ease; }

        .bank-fields label { color: #94a3b8; }

        .bank-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Checkout Button */
        .checkout-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            background: linear-gradient(135deg, #6d28d9, #7c3aed);
            color: #fff;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.4);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(109, 40, 217, 0.6);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── Order Success ─── */
        .order-success {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .order-success.active { display: block; animation: fadeSlideIn 0.5s ease; }

        .order-success .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
        }

        .order-success h2 { color: #22c55e; margin-bottom: 8px; }
        .order-success p { color: #94a3b8; margin-bottom: 6px; }

        .order-success .order-id {
            font-family: monospace;
            color: #a78bfa;
            font-size: 14px;
            margin-top: 12px;
        }

        /* ─── Toast ─── */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(109, 40, 217, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: slideInRight 0.4s ease, fadeOutRight 0.4s ease 3.6s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 360px;
        }

        .toast.success { border-color: rgba(34, 197, 94, 0.4); }
        .toast.error { border-color: rgba(239, 68, 68, 0.4); }
        .toast.info { border-color: rgba(0, 245, 255, 0.4); }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(80px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOutRight {
            to { opacity: 0; transform: translateX(80px); }
        }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .checkout-panel {
                position: static;
            }
        }

        @media (max-width: 600px) {
            .cart-item {
                flex-wrap: wrap;
            }

            .cart-item-img {
                width: 70px;
                height: 70px;
            }

            .bank-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="head-left">
            <img src="images/logo.png" alt="logo">
            <button onclick="window.location.href='store.html'">Products</button>
        </div>
        <div class="head-right" id="nav-links">
            <p><a href="index.html">HOME</a></p>
            <p><a href="index.html#about">ABOUT</a></p>
            <p><a href="store.html">STORE</a></p>
            <p><a href="FAQS.html">FAQS</a></p>
            <p><a href="contact.html">CONTACT</a></p>
            <p id="nav-auth-link"></p>
        </div>
    </header>

    <div class="cart-banner">
        <h1><i class="fas fa-shopping-cart"></i> Your Cart</h1>
    </div>

    <div class="cart-container">
        <!-- Cart Items -->
        <div class="cart-items-panel" id="cart-items-panel">
            <h2><i class="fas fa-box-open"></i> Cart Items</h2>
            <div id="cart-items">
                <div class="empty-cart" id="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Loading your cart...</h3>
                </div>
            </div>
        </div>

        <!-- Checkout Panel -->
        <div class="checkout-panel">
            <div class="checkout-card" id="checkout-card">
                <h2><i class="fas fa-credit-card"></i> Checkout</h2>

                <div class="wallet-display">
                    <span class="wallet-label"><i class="fas fa-coins"></i> Wallet Balance</span>
                    <span class="wallet-amount" id="wallet-balance">$0.00</span>
                </div>

                <div class="order-summary" id="order-summary">
                    <div class="order-row">
                        <span>Items</span>
                        <span id="summary-items">0</span>
                    </div>
                    <div class="order-row">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">$0.00</span>
                    </div>
                    <div class="order-row total">
                        <span>Total</span>
                        <span id="summary-total">$0.00</span>
                    </div>
                </div>

                <div class="checkout-form" id="checkout-form">
                    <label for="checkout-address">Shipping Address</label>
                    <input type="text" id="checkout-address" placeholder="Enter your delivery address" required>

                    <label for="payment-method">Payment Method</label>
                    <select id="payment-method" onchange="toggleBankFields()">
                        <option value="wallet">💰 Wallet Balance</option>
                        <option value="bank">🏦 Bank Card</option>
                    </select>

                    <div class="bank-fields" id="bank-fields">
                        <label>Card Number</label>
                        <input type="text" id="bank-card" placeholder="4242 4242 4242 4242" maxlength="19">
                        <div class="bank-row">
                            <div>
                                <label>Expiry</label>
                                <input type="text" id="bank-expiry" placeholder="MM/YY" maxlength="5">
                            </div>
                            <div>
                                <label>CVV</label>
                                <input type="text" id="bank-cvv" placeholder="123" maxlength="4">
                            </div>
                        </div>
                    </div>

                    <button class="checkout-btn" id="checkout-btn" onclick="processCheckout()">
                        <i class="fas fa-lock"></i> Place Order
                    </button>
                </div>

                <!-- Success State -->
                <div class="order-success" id="order-success">
                    <div class="success-icon"><i class="fas fa-check"></i></div>
                    <h2>Order Placed!</h2>
                    <p>Your order has been processed successfully.</p>
                    <p class="order-id" id="order-id-display"></p>
                    <p id="new-balance-display" style="color: #edff66; margin-top: 12px;"></p>
                    <a href="store.html" style="display:inline-block; margin-top:20px; padding:12px 28px; background:linear-gradient(135deg,#6d28d9,#7c3aed); border-radius:12px; color:#fff; text-decoration:none; font-weight:600;">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const API_BASE = window.location.origin;
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const isLoggedIn = !!token;

        let cartData = [];

        // ─── Init ───
        document.addEventListener('DOMContentLoaded', () => {
            if (!isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            updateNavAuth();
            loadCart();
            loadWalletBalance();
            setupSocketIO();
        });

        function updateNavAuth() {
            const authLink = document.getElementById('nav-auth-link');
            if (isLoggedIn && user) {
                let html = `<a href="#" onclick="logout()" style="color:#edff66;">${user.username} (Logout)</a>`;
                if (user.role === 'admin') {
                    html = `<a href="admin.html" style="color:#00f5ff; margin-right:15px; font-weight:bold;">ADMIN DASHBOARD</a>` + html;
                }
                authLink.innerHTML = html;
            } else {
                authLink.innerHTML = `<a href="login.html" style="color:#edff66;">LOGIN</a>`;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // ─── Load Cart ───
        async function loadCart() {
            try {
                const res = await fetch(`${API_BASE}/api/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                cartData = await res.json();
                renderCart();
            } catch (err) {
                console.error('Failed to load cart:', err);
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');

            if (!cartData.length) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-basket"></i>
                        <h3>Your cart is empty</h3>
                        <p>Explore the store and add some epic gear!</p>
                        <a href="store.html"><i class="fas fa-gamepad"></i> Browse Store</a>
                    </div>`;
                updateSummary();
                return;
            }

            container.innerHTML = cartData.map(item => {
                const p = item.productId;
                if (!p) return '';
                return `
                <div class="cart-item" data-id="${p._id}">
                    <div class="cart-item-img">
                        <img src="${p.image}" alt="${p.title}" onerror="this.src='images/images.jfif'">
                    </div>
                    <div class="cart-item-info">
                        <h4>${p.title}</h4>
                        <div class="item-category">${p.category}</div>
                        <div class="item-price">$${(p.price * item.quantity).toFixed(2)}</div>
                    </div>
                    <div class="qty-controls">
                        <button onclick="updateQty('${p._id}', ${item.quantity - 1})">−</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQty('${p._id}', ${item.quantity + 1})">+</button>
                    </div>
                    <button class="cart-item-remove" onclick="removeItem('${p._id}')" title="Remove">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>`;
            }).join('');

            updateSummary();
        }

        function updateSummary() {
            let total = 0;
            let itemCount = 0;

            cartData.forEach(item => {
                if (item.productId) {
                    total += item.productId.price * item.quantity;
                    itemCount += item.quantity;
                }
            });

            document.getElementById('summary-items').textContent = itemCount;
            document.getElementById('summary-subtotal').textContent = `$${total.toFixed(2)}`;
            document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;
        }

        // ─── Cart Actions ───
        async function updateQty(productId, newQty) {
            if (newQty < 1) {
                removeItem(productId);
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/cart/${productId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({ quantity: newQty }),
                });
                cartData = await res.json();
                renderCart();
            } catch (err) {
                showToast('Failed to update quantity', 'error');
            }
        }

        async function removeItem(productId) {
            try {
                const res = await fetch(`${API_BASE}/api/cart/${productId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                cartData = await res.json();
                renderCart();
                showToast('Item removed', 'info');
            } catch (err) {
                showToast('Failed to remove item', 'error');
            }
        }

        // ─── Wallet Balance ───
        async function loadWalletBalance() {
            try {
                const res = await fetch(`${API_BASE}/api/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                const profile = await res.json();
                document.getElementById('wallet-balance').textContent = `$${profile.walletBalance.toFixed(2)}`;
            } catch (err) {
                console.error('Failed to load wallet:', err);
            }
        }

        // ─── Payment Method Toggle ───
        function toggleBankFields() {
            const method = document.getElementById('payment-method').value;
            const bankFields = document.getElementById('bank-fields');
            bankFields.classList.toggle('active', method === 'bank');
        }

        // ─── Checkout ───
        async function processCheckout() {
            const btn = document.getElementById('checkout-btn');
            const address = document.getElementById('checkout-address').value.trim();
            const paymentMethod = document.getElementById('payment-method').value;

            if (!address) {
                showToast('Please enter a shipping address', 'info');
                return;
            }

            if (!cartData.length) {
                showToast('Your cart is empty', 'info');
                return;
            }

            const body = { address, paymentMethod };

            if (paymentMethod === 'bank') {
                const cardNumber = document.getElementById('bank-card').value.replace(/\s/g, '');
                const expiry = document.getElementById('bank-expiry').value;
                const cvv = document.getElementById('bank-cvv').value;

                if (!cardNumber || !expiry || !cvv) {
                    showToast('Please fill in all bank details', 'info');
                    return;
                }

                body.bankDetails = { cardNumber, expiry, cvv };
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                const res = await fetch(`${API_BASE}/api/payment/checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify(body),
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.message);

                // Update local user data
                const userData = JSON.parse(localStorage.getItem('user'));
                userData.walletBalance = data.newWalletBalance;
                localStorage.setItem('user', JSON.stringify(userData));

                // Show success
                document.getElementById('cart-items-panel').style.display = 'none';
                document.getElementById('checkout-form').style.display = 'none';
                document.getElementById('order-summary').style.display = 'none';

                const successDiv = document.getElementById('order-success');
                successDiv.classList.add('active');
                document.getElementById('order-id-display').textContent = data.order.orderId;
                document.getElementById('new-balance-display').textContent = `New wallet balance: $${data.newWalletBalance.toFixed(2)}`;

                showToast('Order placed successfully!', 'success');
            } catch (err) {
                showToast(err.message || 'Checkout failed', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Place Order';
            }
        }

        // ─── Socket.io ───
        function setupSocketIO() {
            try {
                const socket = io();
                socket.on('orderUpdate', (data) => {
                    showToast(data.message, 'info');
                });
            } catch (e) {
                console.log('Socket.io not available');
            }
        }

        // ─── Toast ───
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>

</html>
