<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gamer's Vault</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<style>
body {
    background: #0a0a0c;
    color: white;
    font-family: 'Orbitron', sans-serif; 
    text-align: center;
}
.grid {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    padding: 20px;
}
.item {
    width: 280px;
    height: 180px;
    border: 2px solid #333;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}
.item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.item:hover {
    border-color: #00f2ff;
    box-shadow: 0 0 15px #00f2ff;
    transform: translateY(-5px);
}
.overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 10;
    align-items: center;
    justify-content: center;
}
.overlay-img {
    max-width: 80%;
    max-height: 80%;
    border: 3px solid #00f2ff;
}
.close {
    position: absolute;
    top: 30px; right: 50px;
    font-size: 50px;
    cursor: pointer;
}
</style>
<body>
<div class="gallery-wrapper">
    <h1>GAMING GALLERY</h1>
    <div class="grid">
        <div class="item"><img src="images/image 1.jfif" alt="Game 1"></div>
        <div class="item"><img src="images/image 2.jfif" alt="Game 2"></div>
        <div class="item"><img src="images/image 3.jfif" alt="Game 3"></div>
        <div class="item"><img src="images/gallery-4.jpeg" alt="Game 4"></div>
        <div class="item"><img src="images/image 5.jfif" alt="Game 5"></div>
        <div class="item"><img src="images/image 6.jfif" alt="Game 6"></div>
      
      
</div>

<div class="overlay">
    <span class="close">&times;</span>
    <img class="overlay-img" src="" alt="Full View">
</div>
<script>
$(document).ready(function() {
    $('.item').click(function() {
        const imgSrc = $(this).find('img').attr('src');
        $('.overlay-img').attr('src', imgSrc);
        $('.overlay').css('display', 'flex').hide().fadeIn(400);
    });
    $('.close').click(function() {
        $('.overlay').fadeOut(300);
    });
    $('.overlay').click(function(e) {
        if (!$(e.target).is('.overlay-img')) {
            $(this).fadeOut(300);
        }
    });

});
</script>
</body>
</html>
